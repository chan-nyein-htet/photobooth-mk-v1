<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Photobooth v5.7.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection@0.4/face_detection.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
    
    <style>
        :root { --primary: #00ff88; --bg: #000; --snap: #ffc107; --card: #121212; --danger: #ff4444; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; height: 100vh; overflow: hidden; }
        
        .app-shell { display: flex; height: 100vh; width: 100vw; }
        @media (max-width: 900px) { .app-shell { flex-direction: column; overflow-y: auto; } }

        .live-section { 
            position: relative; 
            flex-grow: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #000; 
            overflow: hidden;
        }
        
        .header-nav { position: absolute; top: 0; left: 0; width: 100%; padding: 10px; display: flex; gap: 8px; z-index: 1000; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .back-btn { background: #333; color: #fff; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .mode-chip { padding: 8px 12px; border-radius: 8px; border: 1px solid #444; background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; font-size: 11px; }
        .mode-chip.active { background: var(--primary); color: black; font-weight: bold; }

        /* --- DYNAMIC FIXED CONTAINER --- */
        .vf-container { 
            position: relative; 
            background: #111; 
            border: 4px solid #333;
            border-radius: 20px;
            overflow: hidden; 
            transition: all 0.4s ease; /* ပုံစံပြောင်းရင် ချောချောမွေ့မွေ့ဖြစ်အောင် */
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        /* Default Portrait Size */
        .mode-portrait { width: 450px; height: 800px; max-width: 90vw; max-height: 80vh; }
        /* Default Landscape Size */
        .mode-landscape { width: 800px; height: 450px; max-width: 90vw; max-height: 80vh; }

        #liveCanvas, #previewImg { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
        }

        #previewImg { position: absolute; inset: 0; z-index: 4000; display: none; }

        /* BUTTONS */
        .snap-overlay { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 5000; display: flex; gap: 20px; }
        .btn-circle { width: 75px; height: 75px; border-radius: 50%; border: 5px solid rgba(255,255,255,0.4); cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); font-size: 12px; }
        .snap-btn-style { background: var(--snap); color: black; }
        .retake-btn-style { background: var(--danger); color: white; }
        .keep-btn-style { background: var(--primary); color: black; text-align: center; line-height: 1.1; }

        /* SIDEBAR */
        .control-panel { width: 340px; background: #0a0a0a; border-left: 1px solid #222; padding: 20px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; z-index: 100; }
        @media (max-width: 900px) { .control-panel { width: 100%; border-left: none; height: auto; padding-bottom: 40px; } }
        .label { font-size: 11px; color: var(--primary); font-weight: bold; margin-bottom: 8px; display: block; }
        .item-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; }
        .box { width: 55px; height: 55px; background: #1a1a1a; border-radius: 12px; flex-shrink: 0; border: 2px solid #333; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .box.active { border-color: var(--primary); }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .slot { background: #111; aspect-ratio: 1; border-radius: 12px; border: 1px solid #222; overflow: hidden; }
        .slot img { width: 100%; height: 100%; object-fit: cover; }

        /* MODALS */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9000; display: none; align-items: center; justify-content: center; }
        .modal-card { background: var(--card); padding: 30px; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; border: 1px solid #333; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btns button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }

        #setup { position: fixed; inset: 0; background: #000; z-index: 8000; display: flex; align-items: center; justify-content: center; }
        .setup-card { background: var(--card); padding: 30px; border-radius: 24px; width: 85%; max-width: 360px; text-align: center; border: 1px solid #333; }
        .num-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .num-btn { padding: 15px; border-radius: 12px; border: 1px solid #444; background: #1a1a1a; color: white; cursor: pointer; }
        .num-btn.active { background: var(--primary); color: black; font-weight: bold; border-color: var(--primary); }
    </style>
</head>
<body>

    <div id="backModal" class="modal-overlay">
        <div class="modal-card">
            <h3>Exit Session?</h3>
            <div class="modal-btns">
                <button onclick="hideBackModal()" style="background:#333; color:white;">No</button>
                <button onclick="location.reload()" style="background:var(--danger); color:white;">Yes</button>
            </div>
        </div>
    </div>

    <div id="setup">
        <div class="setup-card">
            <h2 style="margin:0; color:var(--primary);">AI Photobooth</h2>
            <div class="num-grid" id="numGrid">
                <button class="num-btn" onclick="selectShots(1, this)">1</button>
                <button class="num-btn" onclick="selectShots(2, this)">2</button>
                <button class="num-btn" onclick="selectShots(3, this)">3</button>
                <button class="num-btn active" onclick="selectShots(4, this)">4</button>
                <button class="num-btn" onclick="selectShots(5, this)">5</button>
                <button class="num-btn" onclick="selectShots(6, this)">6</button>
            </div>
            <button onclick="initApp()" style="width:100%; padding:18px; background:var(--primary); border:none; border-radius:12px; font-weight:bold; cursor:pointer;">START BOOTH</button>
        </div>
    </div>

    <div class="app-shell" id="mainApp" style="display:none;">
        <div class="live-section">
            <div class="header-nav">
                <button class="back-btn" onclick="showBackModal()">⇠ BACK</button>
                <button class="mode-chip active" id="pBtn" onclick="setMode('portrait')">PORTRAIT</button>
                <button class="mode-chip" id="lBtn" onclick="setMode('landscape')">LANDSCAPE</button>
            </div>

            <div class="vf-container mode-portrait" id="vfContainer">
                <div id="countdown" style="position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); font-size:120px; color:var(--primary); font-weight:bold; z-index:5500; display:none;"></div>
                <canvas id="liveCanvas"></canvas>
                <img id="previewImg">
                <video id="video" autoplay playsinline muted style="display:none;"></video>
                
                <div class="snap-overlay">
                    <button id="snapBtn" class="btn-circle snap-btn-style" onclick="startCapture()">SNAP</button>
                    <div id="postCaptureBtns" style="display:none; gap:15px;">
                        <button class="btn-circle retake-btn-style" onclick="retakePhoto()">RETAKE</button>
                        <button class="btn-circle keep-btn-style" onclick="keepPhoto()">KEEP &<br>NEXT</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="control-panel">
            <div>
                <span class="label">STICKERS</span>
                <div class="item-scroll" id="stickerList">
                    <div class="box active" onclick="useSticker(null, this)"><span style="font-size:10px">NONE</span></div>
                </div>
            </div>
            <div>
                <span class="label">GALLERY</span>
                <div class="gallery" id="photoGrid"></div>
            </div>
        </div>
    </div>

    <script>
        let shotLimit = 4; let currentShot = 0; let tempImgData = null;
        const video = document.getElementById('video');
        const canvas = document.getElementById('liveCanvas');
        const ctx = canvas.getContext('2d');
        const previewImg = document.getElementById('previewImg');
        const vfContainer = document.getElementById('vfContainer');
        let activeSticker = null;

        function selectShots(n, btn) {
            shotLimit = n;
            document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function showBackModal() { document.getElementById('backModal').style.display = 'flex'; }
        function hideBackModal() { document.getElementById('backModal').style.display = 'none'; }

        // --- MANUALLY CHANGE FIXED MODES ---
        function setMode(mode) {
            if(mode === 'portrait') {
                vfContainer.className = 'vf-container mode-portrait';
                document.getElementById('pBtn').classList.add('active');
                document.getElementById('lBtn').classList.remove('active');
            } else {
                vfContainer.className = 'vf-container mode-landscape';
                document.getElementById('lBtn').classList.add('active');
                document.getElementById('pBtn').classList.remove('active');
            }
        }

        async function initApp() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            const grid = document.getElementById('photoGrid');
            grid.innerHTML = '';
            for(let i=0; i<shotLimit; i++) grid.innerHTML += `<div class="slot"><img id="shot-${i}" style="width:100%; display:none;"></div>`;
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
            video.srcObject = stream;
            new Camera(video, { onFrame: async () => { await faceDet.send({image: video}); }, width: 1280, height: 720 }).start();
        }

        const faceDet = new FaceDetection({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection@0.4/${f}` });
        faceDet.setOptions({ model: 'short', minDetectionConfidence: 0.6 });
        faceDet.onResults((res) => {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.save(); ctx.scale(-1, 1); ctx.translate(-canvas.width, 0);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            if (res.detections.length > 0 && activeSticker) {
                const b = res.detections[0].boundingBox;
                const x = b.xCenter * canvas.width; const y = b.yCenter * canvas.height;
                const w = b.width * canvas.width * 1.8;
                ctx.drawImage(activeSticker, x - w/2, y - w/1.5, w, w);
            }
            ctx.restore();
        });

        function startCapture() {
            if(currentShot >= shotLimit) return;
            document.getElementById('snapBtn').style.display = 'none';
            let count = 3; const el = document.getElementById('countdown'); el.style.display = 'block';
            const timer = setInterval(() => {
                el.innerText = count;
                if(count <= 0) { 
                    clearInterval(timer); el.style.display = 'none'; 
                    tempImgData = canvas.toDataURL('image/jpeg');
                    previewImg.src = tempImgData;
                    previewImg.style.display = 'block';
                    document.getElementById('postCaptureBtns').style.display = 'flex';
                }
                count--;
            }, 800);
        }

        function retakePhoto() {
            previewImg.style.display = 'none';
            document.getElementById('postCaptureBtns').style.display = 'none';
            document.getElementById('snapBtn').style.display = 'block';
            tempImgData = null;
        }

        function keepPhoto() {
            const img = document.getElementById(`shot-${currentShot}`);
            img.src = tempImgData;
            img.style.display = 'block';
            currentShot++;
            retakePhoto();
        }

        const stickerData = [
            'https://cdn-icons-png.flaticon.com/512/3039/3039233.png',
            'https://cdn-icons-png.flaticon.com/512/616/616408.png',
            'https://cdn-icons-png.flaticon.com/512/2912/2912258.png'
        ];
        stickerData.forEach(url => {
            const b = document.createElement('div'); b.className = 'box'; b.innerHTML = `<img src="${url}">`;
            b.onclick = () => {
                const i = new Image(); i.crossOrigin = "anonymous"; i.src = url;
                i.onload = () => { activeSticker = i; document.querySelectorAll('#stickerList .box').forEach(x=>x.classList.remove('active')); b.classList.add('active'); };
            };
            document.getElementById('stickerList').appendChild(b);
        });
    </script>
</body>
</html>
