<div id="paymentScreen" class="hidden-element fixed inset-0 z-[9000] flex items-center justify-center p-6 transition-all duration-500">
    <div class="apple-glass p-12 text-center w-full max-w-[420px] relative overflow-hidden">
        <h1 class="text-4xl font-black mb-2 uppercase text-white tracking-tight italic">Scan to Pay</h1>
        <p class="text-[10px] text-white/40 uppercase tracking-[0.3em] mb-6">Instant AI Processing</p>

        <div class="bg-white p-6 rounded-[35px] mb-8 mx-auto w-fit shadow-[0_0_40px_rgba(255,215,0,0.1)]">
            <img id="qrCode" src="/static/assets/payment_qr.png" class="w-60 h-60 object-contain aspect-square">
        </div>

        <div class="bg-white/5 py-4 rounded-2xl border border-white/10 mb-8 backdrop-blur-md">
            <p class="text-[10px] text-white/30 uppercase tracking-[0.2em] mb-1 font-bold">Order ID</p>
            <p id="displayOrderID" class="text-2xl font-mono font-black text-primary tracking-widest uppercase">--------</p>
        </div>

        <div class="flex flex-col items-center justify-center gap-3">
            <div class="flex items-center gap-3 text-primary font-bold">
                <span class="loading loading-ring loading-md"></span>
                <span class="animate-pulse tracking-[0.2em] uppercase text-[10px]">Waiting for payment...</span>
            </div>
            <button id="cancelPaymentBtn" class="mt-8 text-white/20 hover:text-white/60 uppercase text-[9px] tracking-[0.3em] transition-all duration-300">Cancel Session</button>
        </div>
    </div>
</div>
