<div id="paymentScreen" class="hidden-element fixed inset-0 z-[9000] bg-black flex items-center justify-center p-6 transition-all duration-500">

        <h1 class="text-4xl font-black mb-2 uppercase text-white tracking-tight">
            Scan to Pay
        </h1>
        
        <div class="bg-white p-6 rounded-[30px] mb-8 mx-auto w-fit mt-6 shadow-[0_0_50px_rgba(255,255,255,0.05)]">
            <img id="qrCode" src="/static/assets/payment_qr.png" class="w-60 h-60 object-contain aspect-square">
        </div>
        
        <div class="bg-white/5 py-4 rounded-2xl border border-white/5 mb-6">

            </p>
        </div>
        
        <div class="flex items-center justify-center gap-4 text-primary font-bold">
