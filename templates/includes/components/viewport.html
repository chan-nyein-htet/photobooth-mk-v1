<main class="viewport relative flex-1 flex flex-col items-center justify-center p-4 overflow-hidden">

    <div id="flashOverlay" class="fixed inset-0 bg-white z-[10000] opacity-0 pointer-events-none transition-opacity duration-75"></div>

    <div class="absolute top-6 left-0 right-0 flex justify-between items-center px-6 z-[60]">
        <button id="toggleOrientationBtn" class="flex items-center gap-2 px-4 py-2 bg-white/5 backdrop-blur-xl border border-white/10 rounded-xl text-white active:scale-95 transition-all">
            <i class="fa-solid fa-rotate text-xs text-primary"></i>
            <span id="orientationText" class="uppercase text-[10px] font-bold tracking-widest">Portrait</span>
        </button>
        <button id="finishBtn" class="hidden-element px-6 py-2 bg-primary text-black rounded-xl font-black uppercase text-[10px] shadow-[0_10px_30px_rgba(255,215,0,0.3)] active:scale-95 transition-all">
            Finish Session
        </button>
    </div>

    <div id="vfContainer" class="vf-container mode-portrait relative apple-glass overflow-hidden border-white/20 shadow-2xl transition-all duration-500 ease-in-out">

        <div id="countdown" class="absolute inset-0 flex items-center justify-center z-[55] text-9xl font-black text-primary pointer-events-none italic drop-shadow-2xl"></div>

        <canvas id="liveCanvas" class="w-full h-full object-cover"></canvas>
        <img id="previewImg" class="hidden-element absolute inset-0 w-full h-full object-cover">
        <video id="video" autoplay playsinline muted class="hidden"></video>

        <div class="absolute bottom-8 left-0 right-0 z-50 flex flex-col items-center gap-6">

            <div id="timerControls" class="flex p-1.5 bg-white/5 backdrop-blur-2xl rounded-2xl border border-white/10 shadow-xl">
                <button class="timer-opt px-4 py-2 text-[10px] font-bold rounded-xl text-white/40 uppercase active-timer transition-all" data-sec="3">3s</button>
                <button class="timer-opt px-4 py-2 text-[10px] font-bold rounded-xl text-white/40 uppercase" data-sec="5">5s</button>
                <button class="timer-opt px-4 py-2 text-[10px] font-bold rounded-xl text-white/40 uppercase" data-sec="10">10s</button>
                <button class="timer-opt px-4 py-2 text-[10px] font-bold rounded-xl text-white/40 uppercase" data-sec="20">20s</button>
            </div>

            <button id="snapBtn" class="group relative w-20 h-20 flex items-center justify-center rounded-full border-4 border-white/30 p-1 bg-transparent active:scale-90 transition-all shadow-2xl">
                <div class="w-full h-full rounded-full bg-white shadow-[0_0_30px_rgba(255,255,255,0.4)]"></div>
            </button>

            <div id="postCaptureBtns" class="hidden-element flex gap-8">
                <button id="retakeBtn" class="w-14 h-14 flex items-center justify-center bg-red-500/80 backdrop-blur-lg text-white rounded-full shadow-xl active:scale-90 border border-white/20">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
                <button id="keepBtn" class="w-14 h-14 flex items-center justify-center bg-primary text-black rounded-full shadow-xl active:scale-90 border border-white/20">
                    <i class="fa-solid fa-check text-xl"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="gallery-wrapper">
        <div id="sidebarPhotoGrid" class="no-scrollbar scroll-smooth"></div>
    </div>
</main>
