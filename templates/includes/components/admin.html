<div id="admin-panel" class="hidden fixed inset-0 bg-black/95 z-[9999] flex items-center justify-center p-2">
    <div class="bg-gray-900 border border-gray-800 w-full max-w-4xl rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[95vh]">

        <div class="px-6 py-4 border-b border-gray-800 flex justify-between items-center bg-gray-800/50 shrink-0">
            <h2 class="text-xl font-bold text-blue-500 flex items-center gap-2">⚙️ Photobooth Admin</h2>
            <div class="flex gap-2 ml-8">
                <button onclick="Admin.showTab('layouts')" class="px-4 py-1.5 rounded-full text-[10px] font-bold bg-blue-600 text-white admin-tab-btn" data-tab="layouts">LAYOUTS</button>
                <button onclick="Admin.showTab('stickers')" class="px-4 py-1.5 rounded-full text-[10px] font-bold bg-gray-800 text-gray-400 admin-tab-btn" data-tab="stickers">STICKERS</button>
                <button onclick="Admin.showTab('filters')" class="px-4 py-1.5 rounded-full text-[10px] font-bold bg-gray-800 text-gray-400 admin-tab-btn" data-tab="filters">FILTERS</button>
                <button onclick="Admin.showTab('fonts')" class="px-4 py-1.5 rounded-full text-[10px] font-bold bg-gray-800 text-gray-400 admin-tab-btn" data-tab="fonts">FONTS</button>
            </div>
            <button onclick="Admin.toggle()" class="text-gray-400 text-2xl p-2 hover:text-white">&times;</button>
        </div>

        <div class="p-6 overflow-y-auto custom-scrollbar">
            
            <div id="tab-layouts" class="admin-tab-content space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-[1fr,300px] gap-6">
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Display Name</label>
                                <input type="text" id="admin_layout_name" placeholder="Wedding Floral" class="w-full bg-gray-800 border border-gray-700 p-3 rounded-lg text-white text-sm outline-none focus:ring-1 focus:ring-blue-500">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Size Type</label>
                                <select id="admin_size_type" class="w-full bg-gray-800 border border-gray-700 p-3 rounded-lg text-white text-sm">
                                    <option value="6x2">6x2 (Strip)</option>
                                    <option value="6x4">6x4 (Grid)</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">PNG Template</label>
                            <div class="border-2 border-dashed border-gray-700 p-4 rounded-xl text-center hover:border-blue-500 cursor-pointer transition-colors" onclick="document.getElementById('admin_tpl_file').click()">
                                <input type="file" id="admin_tpl_file" accept="image/png" class="hidden">
                                <span class="text-blue-400 text-xs font-bold uppercase">📁 Choose PNG Template</span>
                                <p id="file-name-display" class="text-[10px] text-gray-500 mt-1 truncate italic">No file chosen</p>
                            </div>
                        </div>
                        <input type="hidden" id="admin_layout_id">
                    </div>
                    <div class="bg-gray-800 border border-gray-700 aspect-[2/3] rounded-xl flex items-center justify-center p-2 overflow-hidden shadow-inner">
                        <img id="admin_tpl_preview" src="" class="hidden max-w-full max-h-full object-contain">
                        <p id="preview-placeholder" class="text-[10px] text-gray-600 uppercase font-bold tracking-widest">Preview Area</p>
                    </div>
                </div>
                <button onclick="Admin.save()" id="admin_save_btn" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold text-white shadow-lg transition-all active:scale-[0.98]">🚀 Register Template</button>
                <div id="admin_layout_list" class="grid grid-cols-4 gap-4 pt-4 border-t border-gray-800"></div>
            </div>

            <div id="tab-stickers" class="admin-tab-content hidden space-y-6">
                <div class="bg-gray-800/50 p-4 rounded-xl border border-gray-700 grid grid-cols-3 gap-4 items-end">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase">Sticker Name</label>
                        <input type="text" id="stk_name" class="w-full bg-gray-900 border border-gray-700 p-2 rounded text-white text-xs outline-none focus:ring-1 focus:ring-green-500">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase">PNG File</label>
                        <input type="file" id="stk_file" accept="image/png" class="text-[10px] text-gray-400">
                    </div>
                    <button onclick="Admin.saveSticker()" class="bg-green-600 hover:bg-green-700 py-2 rounded font-bold text-white text-xs shadow-lg transition-colors">➕ ADD STICKER</button>
                </div>
                <div id="admin_sticker_list" class="grid grid-cols-4 md:grid-cols-6 gap-4 pt-4 border-t border-gray-800"></div>
            </div>

            <div id="tab-filters" class="admin-tab-content hidden space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-gray-800/50 p-6 rounded-xl border border-gray-700 space-y-4">
                        <input type="text" id="flt_name" placeholder="Filter Name" class="w-full bg-gray-900 border border-gray-700 p-3 rounded text-white text-sm outline-none focus:ring-1 focus:ring-purple-500">
                        <input type="text" id="flt_css" placeholder="grayscale(1) contrast(1.2)" class="w-full bg-gray-900 border border-gray-700 p-3 rounded text-white text-sm font-mono">
                        <button onclick="Admin.saveFilter()" class="w-full bg-purple-600 hover:bg-purple-700 py-3 rounded-xl font-bold text-white shadow-lg transition-colors">✨ REGISTER FILTER</button>
                    </div>
                    <div class="bg-gray-800 border border-gray-700 rounded-xl p-4 flex flex-col items-center">
                        <p class="text-[10px] font-bold text-gray-500 uppercase mb-2">Live Preview</p>
                        <img id="filter_preview_img" src="https://images.unsplash.com/photo-1542038784456-1ea8e935640e?q=80&w=400" class="w-full aspect-video object-cover rounded shadow-2xl">
                    </div>
                </div>
                <div id="admin_filter_list" class="grid grid-cols-2 md:grid-cols-4 gap-4 border-t border-gray-800 pt-6"></div>
            </div>

            <div id="tab-fonts" class="admin-tab-content hidden space-y-6">
                <div class="bg-gray-800/50 p-4 rounded-xl border border-gray-700 flex items-end gap-4 shadow-lg">
                    <div class="flex-1">
                        <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase tracking-wider">Upload Font (TTF/OTF)</label>
                        <input type="file" id="fnt_file" accept=".ttf,.otf" class="w-full text-xs text-gray-400 cursor-pointer">
                    </div>
                    <button onclick="Admin.saveFont()" class="bg-orange-600 hover:bg-orange-700 px-6 py-2 rounded-lg font-bold text-white text-xs transition-colors shadow-lg active:scale-95">🖋️ UPLOAD FONT</button>
                </div>
                
                <div class="p-8 bg-gray-950 rounded-xl border border-gray-800 text-center shadow-inner relative overflow-hidden">
                    <div class="absolute inset-0 opacity-10 pointer-events-none flex items-center justify-center text-[100px] font-bold text-white">Aa</div>
                    <p id="font-preview-text" class="text-white text-2xl truncate uppercase relative z-10">Sample Text Preview</p>
                </div>

                <div class="border-t border-gray-800 pt-6">
                    <h3 class="text-[10px] font-bold text-gray-400 uppercase mb-4 flex items-center gap-2">
                        <span class="w-2 h-2 bg-orange-500 rounded-full animate-pulse"></span>
                        Active System Fonts
                    </h3>
                    <div id="admin_font_list" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        </div>
                </div>
            </div>

        </div>
    </div>
</div>
