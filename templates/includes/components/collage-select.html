<section id="collageSelect" class="viewport p-10 flex flex-col items-center justify-center hidden-element">
    <div class="collage-header text-center mb-12">
        <h2 class="text-5xl font-extrabold text-white mb-4 tracking-tight uppercase italic">Select Style</h2>
        <div class="h-1 w-24 bg-primary mx-auto rounded-full"></div>
    </div>

    <div class="collage-grid-wrapper flex gap-10 w-full max-w-6xl justify-center">
        
        <div id="layout-aplus" class="layout-card-btn group cursor-pointer" data-layout="A+" data-shots="3">
            <div class="apple-glass p-6">
                <div class="preview-box preview-aplus">
                    <div class="preview-slot"></div>
                    <div class="preview-slot"></div>
                    <div class="preview-slot"></div>
                </div>
                <div class="layout-meta mt-6">
                    <span class="text-2xl font-bold text-white block">LAYOUT A+</span>
                    <span class="text-white/40 text-sm font-mono uppercase tracking-widest">3 Dynamic Shots</span>
                </div>
            </div>
        </div>

        <div id="layout-b" class="layout-card-btn group cursor-pointer" data-layout="B" data-shots="4">
            <div class="apple-glass p-6">
                <div class="preview-box preview-b">
                    <div class="preview-slot"></div>
                    <div class="preview-slot"></div>
                    <div class="preview-slot"></div>
                    <div class="preview-slot"></div>
                </div>
                <div class="layout-meta mt-6">
                    <span class="text-2xl font-bold text-white block">LAYOUT B</span>
                    <span class="text-white/40 text-sm font-mono uppercase tracking-widest">4 Classic Shots</span>
                </div>
            </div>
        </div>

    </div>

    <button id="backToWelcomeBtn" class="mt-16 text-white/30 hover:text-primary transition-all duration-300 font-mono tracking-widest uppercase">
        [ ESCAPE TO HOME ]
    </button>
</section>
