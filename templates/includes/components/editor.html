<section id="photoEditorView" class="fixed inset-0 w-full h-full flex flex-col hidden-element overflow-hidden app-dynamic-bg">
    <div class="absolute inset-0 bg-black/60 -z-10"></div>

    <div class="flex-1 w-full flex items-center justify-center p-4">
        <div class="apple-glass p-2 editor-canvas-wrapper shadow-2xl relative">
            <canvas id="editorCanvas"></canvas>
            
            <div id="editorTip" class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-black/50 backdrop-blur-md px-4 py-2 rounded-full text-[10px] text-white/70 pointer-events-none">
                Tap a photo to add effects or swap from gallery
            </div>
        </div>
    </div>

    <div class="w-full apple-glass rounded-t-[40px] p-6 flex flex-col gap-5 shadow-[0_-10px_50px_rgba(0,0,0,0.5)] border-t border-white/10">
        
        <div id="selectionHeader" class="flex justify-between items-center px-2">
            <span id="activeActionTitle" class="text-white/40 text-[10px] font-black uppercase tracking-widest">Select to Edit</span>
            <span id="selectionBadge" class="hidden bg-primary px-3 py-1 rounded-full text-[9px] text-black font-heavy uppercase">Selected</span>
        </div>

        <div class="flex flex-col gap-2">
            <div id="galleryList" class="flex gap-3 overflow-x-auto no-scrollbar py-2 px-1 items-center min-h-[90px]">
                <div class="animate-pulse flex gap-3">
                    <div class="w-16 h-16 bg-white/5 rounded-xl"></div>
                    <div class="w-16 h-16 bg-white/5 rounded-xl"></div>
                    <div class="w-16 h-16 bg-white/5 rounded-xl"></div>
                </div>
            </div>
        </div>

        <div class="relative min-h-[80px]">
            <div id="stickerList" class="flex gap-3 overflow-x-auto no-scrollbar items-center">
                </div>

            <div id="effectList" class="hidden flex gap-3 overflow-x-auto no-scrollbar items-center">
                </div>

            <div id="aiToolList" class="hidden flex gap-3 items-center justify-center w-full">
                <button onclick="Editor.removeBG()" class="bg-gradient-to-r from-indigo-500 to-purple-500 px-6 py-3 rounded-2xl text-white text-[11px] font-black uppercase tracking-tighter shadow-lg active:scale-95">
                    ✨ Remove Background
                </button>
            </div>
        </div>

        <div class="flex gap-4 w-full pt-2">
            <button id="deleteObjBtn" class="flex-1 py-4 rounded-2xl border border-white/10 text-white/50 text-[10px] font-black uppercase tracking-widest active:scale-95 transition-all hover:bg-red-500/10">
                Remove
            </button>
            <button id="saveEditBtn" class="flex-[2] bg-primary py-4 rounded-2xl text-black font-heavy uppercase tracking-widest active:scale-95 shadow-[0_0_20px_rgba(var(--color-primary),0.3)]">
                Print Photo ✨
            </button>
        </div>
    </div>
</section>
