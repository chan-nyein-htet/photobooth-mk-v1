<section id="photoEditorView" class="fixed inset-0 w-full h-full flex flex-col hidden-element overflow-hidden app-dynamic-bg">
    <div class="absolute inset-0 bg-black/60 -z-10"></div>

    <div class="flex-1 w-full flex items-center justify-center p-4 relative">
        <div id="controlArrows" class="hidden apple-glass editor-controls-popup rounded-[25px]">
            <div class="arrow-grid">
                <div></div>
                <button onclick="window.Editor.moveSelected('up')" class="move-btn">▲</button>
                <div></div>
                <button onclick="window.Editor.moveSelected('left')" class="move-btn">◀</button>
                <div class="flex items-center justify-center text-[8px] font-black opacity-30 tracking-tighter">MOVE</div>
                <button onclick="window.Editor.moveSelected('right')" class="move-btn">▶</button>
                <div></div>
                <button onclick="window.Editor.moveSelected('down')" class="move-btn">▼</button>
                <div></div>
            </div>
        </div>

        <div class="p-2 editor-canvas-wrapper relative">
            <div class="canvas-container overflow-hidden">
                <canvas id="editorCanvas"></canvas>
            </div>
        </div>
    </div>

    <div class="w-full apple-glass rounded-t-[40px] p-6 flex flex-col gap-4 shadow-2xl border-t border-white/10">
        <div class="flex justify-between items-center px-2">
            <span class="text-white/40 text-[10px] font-black uppercase tracking-widest">Editor Tools</span>
            <span id="selectionBadge" class="hidden bg-primary px-3 py-1 rounded-full text-[9px] text-black font-heavy uppercase animate-pulse">Photo Selected</span>
        </div>

        <div id="effectList" class="hidden flex gap-3 overflow-x-auto no-scrollbar py-1"></div>

        <div id="galleryList" class="flex gap-3 overflow-x-auto no-scrollbar py-2 items-center min-h-[90px]"></div>

        <div class="flex gap-4 w-full pt-2">
            <button id="saveEditBtn" class="w-full bg-primary py-4 rounded-2xl text-black font-heavy uppercase tracking-widest active:scale-95 shadow-lg">
                Print Photo ✨
            </button>
        </div>
    </div>
</section>
